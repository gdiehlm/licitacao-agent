services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: licitacao
      POSTGRES_PASSWORD: licitacao123
      POSTGRES_DB: licitacao_agent
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  web:
    build: ./app
    environment:
      - DATABASE_URL=postgresql://licitacao:licitacao123@postgres:5432/licitacao_agent
      - REDIS_URL=redis://redis:6379/0
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-1.5-pro}
      - GEMINI_TIMEOUT=${GEMINI_TIMEOUT:-120}
      - TEMPLATES_DIR=/data/templates
      - OUTPUTS_DIR=/data/outputs
      - LOGS_DIR=/data/logs
      - TZ=America/Sao_Paulo
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    depends_on:
      - postgres
      - redis

  worker:
    build: ./app
    command: ["python", "-m", "rq", "worker", "default"]
    environment:
      - DATABASE_URL=postgresql://licitacao:licitacao123@postgres:5432/licitacao_agent
      - REDIS_URL=redis://redis:6379/0
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-1.5-pro}
      - GEMINI_TIMEOUT=${GEMINI_TIMEOUT:-120}
      - TEMPLATES_DIR=/data/templates
      - OUTPUTS_DIR=/data/outputs
      - LOGS_DIR=/data/logs
      - TZ=America/Sao_Paulo
    volumes:
      - ./data:/data
    depends_on:
      - postgres
      - redis

volumes:
  pgdata:
