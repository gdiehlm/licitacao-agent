services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: licitacao
      POSTGRES_PASSWORD: licitacao123
      POSTGRES_DB: licitacao_agent
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  searxng:
    image: searxng/searxng:latest
    ports:
      - "8080:8080"
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama

  ollama-pull:
    image: ollama/ollama:latest
    depends_on:
      - ollama
    entrypoint: ["/bin/sh", "-lc"]
    command: ["sleep 2 && ollama pull qwen2.5:7b"]
    environment:
      - OLLAMA_HOST=http://ollama:11434
    restart: "no"

  web:
    build: ./app
    environment:
      - DATABASE_URL=postgresql://licitacao:licitacao123@postgres:5432/licitacao_agent
      - REDIS_URL=redis://redis:6379/0
      - SEARXNG_URL=http://searxng:8080
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=qwen2.5:7b
      - OLLAMA_TIMEOUT=600
      - TEMPLATES_DIR=/data/templates
      - OUTPUTS_DIR=/data/outputs
      - LOGS_DIR=/data/logs
      - TZ=America/Sao_Paulo
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    depends_on:
      - postgres
      - redis
      - searxng
      - ollama
      - ollama-pull

  worker:
    build: ./app
    command: ["python", "-m", "rq", "worker", "default"]
    environment:
      - DATABASE_URL=postgresql://licitacao:licitacao123@postgres:5432/licitacao_agent
      - REDIS_URL=redis://redis:6379/0
      - SEARXNG_URL=http://searxng:8080
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=qwen2.5:7b
      - OLLAMA_TIMEOUT=120
      - TEMPLATES_DIR=/data/templates
      - OUTPUTS_DIR=/data/outputs
      - LOGS_DIR=/data/logs
      - TZ=America/Sao_Paulo
    volumes:
      - ./data:/data
    depends_on:
      - postgres
      - redis
      - searxng
      - ollama
      - ollama-pull

volumes:
  pgdata:
  ollama:
